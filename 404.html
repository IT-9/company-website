<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - IT9</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }
        .error-page h1 { font-size: 4rem; color: var(--primary-color); margin-bottom: 0.5rem; }
        .error-page h2 { font-size: 1.5rem; color: var(--text-color); margin-bottom: 1rem; }
        .error-page p { color: var(--text-light); margin-bottom: 2rem; max-width: 500px; }
        .error-page .cta-button { display: inline-block; }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo" tabindex="0" role="button" aria-label="IT9 home">
                <a href="/"><img src="img/logo.jpeg" alt="IT9 Ltd logo" class="logo-image"></a>
            </div>
        </nav>
    </header>
    <main>
        <section class="error-page">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you are looking for does not exist or has been moved. Let us get you back on route.</p>
            <a href="/" class="cta-button">Back to Home</a>
        </section>
    </main>
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <p><i class="fas fa-copyright" aria-hidden="true"></i> IT9 Ltd. All Rights Reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
